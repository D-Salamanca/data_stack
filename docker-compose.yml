version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: fhbd-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: fhbd-nessie
    user: root
    ports:
      - "19120:19120"
    env_file:
      - ./.env
    environment:
      - NESSIE_SERVER_AUTHENTICATION_ENABLED=false
      - QUARKUS_HTTP_PORT=19120
      - NESSIE_VERSION_STORE_TYPE=IN_MEMORY
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=warehouse
      - NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION=s3://iceberg
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://fhbd-minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE=application-global
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - AWS_REGION=us-east-1
    depends_on:
      - minio

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: fhbd-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9002:9000"   # Native (mapped)
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-lakehouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  jupyter:
    image: jupyter/base-notebook:latest
    container_name: fhbd-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=fhbd

      - MINIO_ENDPOINT=http://fhbd-minio:9000
      - MINIO_BUCKET=raw
      - MINIO_BUCKET_RAW=raw
      - MINIO_BUCKET_ICEBERG=iceberg
      - MINIO_OBJECT_KEY=nyc/yellow_tripdata_2025-01.parquet
      - PARQUET_URL=https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2025-01.parquet

      # Credenciales MinIO desde .env
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      # Nessie
      - NESSIE_URL=http://fhbd-nessie:19120/iceberg
      - NESSIE_BRANCH=main

      # Iceberg
      - ICEBERG_NAMESPACE=nyc
      - ICEBERG_TABLE=yellow_tripdata

      # ClickHouse interno para scripts/notebooks dentro del contenedor
      - CLICKHOUSE_HOST=fhbd-clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_NATIVE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-lakehouse}

    volumes:
      - ./scripts:/home/jovyan/scripts
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - ./requirements.txt:/home/jovyan/requirements.txt:ro
      - ./.env:/home/jovyan/.env
    depends_on:
      - minio
      - nessie
      - clickhouse
    command: >
      bash -lc "pip install -r /home/jovyan/requirements.txt &&
      start-notebook.py --NotebookApp.token=$${JUPYTER_TOKEN}"

volumes:
  minio_data:
  nessie_data:
  clickhouse_data:

version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: fhbd-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nessie:
    image: projectnessie/nessie:latest
    container_name: fhbd-nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_SERVER_AUTHENTICATION_ENABLED=false
      - QUARKUS_HTTP_PORT=19120
      # Persistencia del catálogo (RocksDB)
      - nessie.version.store.type=ROCKSDB
      - nessie.version.store.persist.rocks.database-path=/var/lib/nessie/rocksdb
    volumes:
      - nessie_data:/var/lib/nessie

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: fhbd-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9002:9000"   # Native (mapped)
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  jupyter:
    image: jupyter/base-notebook:latest
    container_name: fhbd-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=fhbd

      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_BUCKET=raw
      - MINIO_OBJECT_KEY=nyc/yellow_tripdata_2025-01.parquet
      - PARQUET_URL=https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2025-01.parquet

      # paths de docker secrets dentro del contenedor
      - MINIO_ACCESS_KEY_FILE=/run/secrets/minio_access_key
      - MINIO_SECRET_KEY_FILE=/run/secrets/minio_secret_key

    volumes:
      - ./scripts:/home/jovyan/scripts
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - ./requirements.txt:/home/jovyan/requirements.txt:ro
    secrets:
      - minio_access_key
      - minio_secret_key
    depends_on:
      - minio
      - nessie
      - clickhouse
    command: >
      bash -lc "pip install -r /home/jovyan/requirements.txt &&
      start-notebook.py --NotebookApp.token=$${JUPYTER_TOKEN}"

secrets:
  minio_access_key:
    file: ./secrets/minio_access_key
  minio_secret_key:
    file: ./secrets/minio_secret_key

volumes:
  minio_data:
  nessie_data:
  clickhouse_data: